executor: LocalExecutor
airflowVersion: "2.9.3"

images:
  airflow:
    repository: apache/airflow
    tag: "2.9.3"
    pullPolicy: IfNotPresent

# ── Webserver ──────────────────────────────────────────────────────────────────
webserver:
  defaultUser:
    enabled:   true
    role:      Admin
    username:  admin
    email:     admin@cdp.local
    firstName: CDP
    lastName:  Admin
    password:  admin
  service:
    type: ClusterIP
  # FIX: cut requests from 512Mi → 256Mi so all pods fit in a 2-4GB Docker Desktop
  resources:
    requests:
      memory: "256Mi"
      cpu:    "100m"
    limits:
      memory: "768Mi"
      cpu:    "500m"
  # FIX: give the webserver plenty of time to start after DB migrations
  startupProbe:
    failureThreshold: 20
    periodSeconds:    15
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds:       20
    failureThreshold:    10
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds:       20
    failureThreshold:    10

# ── Scheduler ─────────────────────────────────────────────────────────────────
scheduler:
  resources:
    requests:
      memory: "256Mi"
      cpu:    "100m"
    limits:
      memory: "768Mi"
      cpu:    "500m"
  # FIX: give the scheduler time to run DB migrations before liveness kicks in
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds:       30
    failureThreshold:    10

# ── Triggerer ─────────────────────────────────────────────────────────────────
triggerer:
  enabled: true
  resources:
    requests:
      memory: "128Mi"
      cpu:    "50m"
    limits:
      memory: "256Mi"
      cpu:    "200m"

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
# FIX: persistence disabled — removes the PVC dependency that was blocking pod
# scheduling. For local dev, data resets on cluster restart is acceptable.
# Re-enable if you need data to persist across cdp-dev stop/start.
postgresql:
  enabled: true
  auth:
    enablePostgresUser: true
    postgresPassword: "cdplocal"
    username:         "airflow"
    password:         "airflow"
    database:         "airflow"
  primary:
    persistence:
      enabled: false          # FIX: was true with storageClass "standard" → PVC stuck Pending
    resources:
      requests:
        memory: "128Mi"
        cpu:    "50m"
      limits:
        memory: "256Mi"
        cpu:    "300m"

# ── DAGs / Logs (no persistence needed for local dev) ─────────────────────────
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: false

logs:
  persistence:
    enabled: false

# ── Disable components not needed for local dev ───────────────────────────────
redis:
  enabled: false
flower:
  enabled: false
workers:
  replicas: 0
statsd:
  enabled: false

# ── Misc ───────────────────────────────────────────────────────────────────────
env:
  - name:  LOCAL_MODE
    value: "true"

# FIX: valid base64url-encoded 32-byte Fernet key (regenerated by _sanitize_airflow_values)
fernetKey: "zTJNEdj3kgM6oFgjhYsJSStocV0YmBGLvLGAtzakBd0="
webserverSecretKey: ""
