executor: LocalExecutor
airflowVersion: "2.9.3"

# Pin the image explicitly so Helm chart version changes don't pull a newer image
images:
  airflow:
    repository: apache/airflow
    tag: "2.9.3"
    pullPolicy: IfNotPresent

webserver:
  defaultUser:
    enabled:   true
    role:      Admin
    username:  admin
    email:     admin@cdp.local
    firstName: CDP
    lastName:  Admin
    password:  admin
  service:
    type: ClusterIP
  resources:
    requests:
      memory: "512Mi"
      cpu:    "200m"
    limits:
      memory: "1Gi"
      cpu:    "500m"

scheduler:
  resources:
    requests:
      memory: "512Mi"
      cpu:    "200m"
    limits:
      memory: "1Gi"
      cpu:    "500m"

triggerer:
  enabled: true
  resources:
    requests:
      memory: "256Mi"
      cpu:    "100m"
    limits:
      memory: "512Mi"
      cpu:    "300m"

postgresql:
  enabled: true
  auth:
    enablePostgresUser: true
    postgresPassword: "cdplocal"
    username:         "airflow"
    password:         "airflow"
    database:         "airflow"
  primary:
    persistence:
      enabled:      true
      storageClass: "standard"
      size:         "2Gi"
    resources:
      requests:
        memory: "256Mi"
        cpu:    "100m"
      limits:
        memory: "512Mi"
        cpu:    "300m"

dags:
  persistence:
    enabled: false
  gitSync:
    enabled: false

logs:
  persistence:
    enabled: false

redis:
  enabled: false

flower:
  enabled: false

workers:
  replicas: 0

statsd:
  enabled: false

env:
  - name:  LOCAL_MODE
    value: "true"

fernetKey: "qwerty12345678901234567890123456789012345="
webserverSecretKey: "cdp-local-dev-secret-key-change-in-prod"

# Give migration and user-creation jobs enough time to complete
migrateDatabaseJob:
  enabled: true
  jobAnnotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
  resources:
    requests:
      memory: "256Mi"
      cpu:    "100m"

createUserJob:
  enabled: true
  resources:
    requests:
      memory: "256Mi"
      cpu:    "100m"
